<!doctype html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>AI Interview</title>

  <style>

    body{
      background:#020617;
      color:white;
      font-family:Arial;
      padding:40px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:16px;
      margin-bottom:20px;
    }

    textarea{
      width:100%;
      height:150px;
      padding:10px;
      border:none;
      border-radius:10px;
    }

    button{
      padding:15px 25px;
      background:#3b82f6;
      color:white;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
    }

  </style>

</head>

<body>

<h1>Adaptive AI Interview</h1>

<div class="card">

    <h2 id="question">Loading...</h2>

    <p>
      Skill:
      <span id="skill"></span>
    </p>

    <p>
      Difficulty:
      <span id="difficulty"></span>
    </p>

</div>

<textarea id="answer"></textarea>

<br><br>

<button onclick="submitAnswer()">
  Submit Answer
</button>

<script src="js/interview.js"></script>

<script>

startInterview(1)

</script>

</body>

</html>
