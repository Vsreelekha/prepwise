<!DOCTYPE html>
<html>
<head>
  <title>Interview</title>
  <style>
    body {
      background: #050520;
      color: white;
      font-family: Arial;
      padding: 40px;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-top: 20px;
      border-radius: 10px;
      padding: 15px;
    }

    button {
      padding: 12px 20px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      background: #7c5cff;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>AI Mock Interview</h1>

  <h3>Question:</h3>
  <p>Explain the difference between SQL and NoSQL databases.</p>

  <textarea placeholder="Type your answer..."></textarea>

  <button onclick="submitAnswer()">Submit Answer</button>

  <script>
    function submitAnswer() {
      alert('AI Evaluation Completed! Score: 82/100');
      window.location.href='results.html';
    }
  </script>
</body>
</html>
